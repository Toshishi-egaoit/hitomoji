<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hitomoji Password Field Test</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      margin: 24px;
      line-height: 1.5;
    }

    main {
      max-width: 760px;
    }

    label {
      display: block;
      margin: 18px 0 6px;
      font-weight: 600;
    }

    input,
    textarea,
    [contenteditable] {
      box-sizing: border-box;
      width: 100%;
      max-width: 520px;
      padding: 8px 10px;
      font: inherit;
    }

    [contenteditable] {
      min-height: 44px;
      border: 1px solid ButtonBorder;
      border-radius: 2px;
      background: Field;
      color: FieldText;
    }

    #log {
      width: 100%;
      max-width: 720px;
      min-height: 180px;
      margin-top: 20px;
      padding: 10px;
      overflow: auto;
      border: 1px solid ButtonBorder;
      background: Canvas;
      white-space: pre-wrap;
      font-family: Consolas, "Cascadia Mono", monospace;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Hitomoji Password Field Test</h1>

    <label for="plain">Plain text input</label>
    <input id="plain" name="plain" type="text" autocomplete="off" placeholder="type here">

    <label for="password">Password input</label>
    <input id="password" name="password" type="password" autocomplete="current-password" placeholder="password">

    <label for="new-password">New password input</label>
    <input id="new-password" name="new-password" type="password" autocomplete="new-password" placeholder="new password">

    <label for="search">Search input</label>
    <input id="search" name="search" type="search" placeholder="search">

    <label for="search">number input</label>
    <input id="number" type="number">
    <input id="numeric" inputmode="numeric">

    <label for="search">postal-code input</label>
    <input id="postal" autocomplete="postal-code" inputmode="numeric" pattern="[0-9]*">

    <label for="search">Tel input</label>
    <input id="tel" type="tel">

    <label for="email">Email input</label>
    <input id="email" name="email" type="email" placeholder="name@example.com">

    <label for="textarea">Textarea</label>
    <textarea id="textarea" name="textarea" rows="3" placeholder="textarea"></textarea>

    <label for="editable">Contenteditable</label>
    <div id="editable" contenteditable="true" role="textbox" aria-label="contenteditable">contenteditable</div>

    <div id="log" aria-live="polite"></div>
  </main>

  <script>
    const log = document.getElementById("log");
    const fields = document.querySelectorAll("input, textarea, [contenteditable]");

    function fieldName(el) {
      const type = el.getAttribute("type");
      return `${el.tagName.toLowerCase()}#${el.id}${type ? `[type=${type}]` : ""}`;
    }

    function write(message) {
      const now = new Date();
      const time = now.toLocaleTimeString("en-US", { hour12: false }) +
        "." + String(now.getMilliseconds()).padStart(3, "0");
      log.textContent = `[${time}] ${message}\n` + log.textContent;
    }

    for (const field of fields) {
      field.addEventListener("focus", () => write(`focus ${fieldName(field)}`));
      field.addEventListener("blur", () => write(`blur ${fieldName(field)}`));
      field.addEventListener("keydown", event => {
        write(`keydown ${fieldName(field)} key=${event.key} code=${event.code} isComposing=${event.isComposing}`);
      });
      field.addEventListener("input", event => {
        write(`input ${fieldName(field)} inputType=${event.inputType || "(none)"}`);
      });
      field.addEventListener("compositionstart", () => write(`compositionstart ${fieldName(field)}`));
      field.addEventListener("compositionend", () => write(`compositionend ${fieldName(field)}`));
    }

    write("ready");
  </script>
</body>
</html>
